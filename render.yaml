services:
  - type: web
    name: music
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn music.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
